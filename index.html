  const allEffects = [...new Set([...set1].filter(v => set2.has(v)))].sort();

  if (!allEffects.length) return '';

  const rows = allEffects.map(v => {
    const l1 = level(v, a1), l2 = level(v, a2);
    if (l1 === l2) return ''; // skip equal rows
    return `<tr class="pwr-row"><td class="pwr-var">${esc(v)}</td><td class="pwr-cell">${edgeHTML(l1, l2)}</td></tr>`;
  }).filter(Boolean).join('');

  if (!rows) return '';

  return `
    <div>
      <div class="analysis-section-title" style="margin-bottom:6px"><span data-def="power-advantage" id="anal-power-title">Power Advantage</span></div>
      <table class="pwr-table">
        <thead><tr><th class="pwr-th">Effect</th><th class="pwr-th">Edge</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Syntax highlight ───────────────────────────────────────────────
function syntaxHighlight(code) {
  return code
    .replace(/\b(from|import|if|else|for|in|return|True|False|None)\b/g, '<span class="code-kw">$1</span>')
    .replace(/\b(ExperimentVariable|Design|Units|assign|nest|cross|multifact)\b/g, '<span class="code-fn">$1</span>')
    .replace(/\.(within_subjects|between_subjects|counterbalance|order|limit_plans|num_trials|start_with)\b/g, '.<span class="code-op">$1</span>')
    .replace(/(&quot;[^&]*&quot;)/g, '<span class="code-str">$1</span>');
}

// ── Utility ────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _activeTab = 0; // 0 = Rambler, 1..N = user tabs (index into _userTabStates), 'tut' = tutorial

function makeEmptyTab() {
  return { variables: [], designs: [], compositions: [], units: 12, selectedTarget: null };
}

function renameUserTab(tabIdx) {
  const s = _userTabStates[tabIdx - 1];
  if (!s) return;
  const name = prompt('Tab name:', s.label || `Tab ${tabIdx}`);
  if (name !== null) { s.label = name.trim() || `Tab ${tabIdx}`; renderTabBar(); render(); }
}

function renderTabBar() {
  const container = document.getElementById('userTabs');
  container.innerHTML = _userTabStates.map((s, i) => {
    const tabIdx = i + 1;
    const isActive = _activeTab === tabIdx;
    const label = s.label || `Tab ${tabIdx}`;
    return `<button class="tab${isActive ? ' active' : ''}" onclick="switchLeftTab(${tabIdx})" ondblclick="event.stopPropagation();renameUserTab(${tabIdx})" title="Double-click to rename" style="display:inline-flex;align-items:center;gap:4px">
      <span>${esc(label)}</span>
      <span onclick="event.stopPropagation();removeUserTab(${tabIdx})" style="font-size:12px;line-height:1;opacity:.6;cursor:pointer" title="Close">×</span>
    </button>`;
  }).join('');
  document.getElementById('ltab0').classList.toggle('active', _activeTab === 0);
  document.getElementById('tutTab').classList.toggle('active', _activeTab === 'tut');
}

function addNewTab() {
  const name = prompt('Tab name:');
  if (name === null) return; // cancelled
  const newState = makeEmptyTab();
  newState.label = name.trim() || `Tab ${_userTabStates.length + 1}`;
  _userTabStates.push(newState);
  const tabIdx = _userTabStates.length;
  renderTabBar();
  switchLeftTab(tabIdx);
}

function removeUserTab(tabIdx) {
  const arrIdx = tabIdx - 1;
  _userTabStates.splice(arrIdx, 1);
  if (_activeTab === tabIdx) {
    switchLeftTab(0);
  } else {
    if (_activeTab > tabIdx) _activeTab--;
    renderTabBar();
  }
}

function saveCurrentTabState() {
  const units = parseInt(document.getElementById('unitsInput').value) || 12;
  if (_activeTab === 0) {
    _states[0].units = units;
    _states[0].selectedTarget = _selectedTarget;
  } else if (_activeTab === 'tut') {
    _states[1].units = units;
    _states[1].selectedTarget = _selectedTarget;
  } else {
    const s = _userTabStates[_activeTab - 1];
    if (s) { s.units = units; s.selectedTarget = _selectedTarget; }
  }
}

function loadTab(idx) {
  let s;
  if (idx === 0) s = _states[0];
  else if (idx === 'tut') s = _states[1];
  else s = _userTabStates[idx - 1];
  if (!s) return;
  state.variables    = s.variables;
  state.designs      = s.designs;
  state.compositions = s.compositions;
  state.units        = s.units;
  _selectedTarget    = s.selectedTarget;
  document.getElementById('unitsInput').value = s.units;
}

function switchLeftTab(idx) {
  saveCurrentTabState();
  if (_tutActive) endTutorial();
  _activeTab = idx;
  loadTab(idx);
  renderTabBar();
  render();
  if (idx === 'tut') setTimeout(startTutorial, 300);
}

loadTab(0);
renderTabBar();
render();

let _pollVer = 0;

async function doPoll() {
  try {
    const res = await fetch('/api/poll');
    const { version, data } = await res.json();
    if (version > _pollVer) {
      _pollVer = version;
      if (data) renderPushedResults(data);
    }
  } catch(_) {}
}
setInterval(doPoll, 1000);

let _tutIdx = 0;
let _tutActive = false;

function startTutorial() {
  _tutActive = true;
  _tutIdx = 0;
  _showTutStep();
}

function endTutorial() {
  _tutActive = false;
  document.getElementById('tutTip').style.display = 'none';
  document.getElementById('tutHighlight').style.display = 'none';
}

function tutStep(dir) {
  _tutIdx += dir;
  if (_tutIdx >= _tutSteps.length) { endTutorial(); return; }
  if (_tutIdx < 0) _tutIdx = 0;
  _showTutStep();
}

function _showTutStep() {
  const step = _tutSteps[_tutIdx];
  const tip  = document.getElementById('tutTip');
  const hl   = document.getElementById('tutHighlight');

  // Auto-select the appropriate design or composition for Run
  if (step.autoSelect) {
    const { type, idx } = step.autoSelect;
    const item = type === 'design' ? state.designs[idx] : state.compositions[idx];
    if (item) { _selectedTarget = item.id; render(); }
  }

  // Auto-set the Compare dropdowns
  if (step.autoCompare) {
    const resolveId = ({ type, idx }) => type === 'design' ? state.designs[idx]?.id : state.compositions[idx]?.id;
    const id1 = resolveId(step.autoCompare.t1);
    const id2 = resolveId(step.autoCompare.t2);
    requestAnimationFrame(() => {
      const sel1 = document.getElementById('cmpSel1');
      const sel2 = document.getElementById('cmpSel2');
      const btn  = document.getElementById('compareBtn');
      if (sel1 && id1) sel1.value = id1;
      if (sel2 && id2) sel2.value = id2;
      if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    });
  }

  document.getElementById('tutTitle').textContent = step.title;
  document.getElementById('tutText').innerHTML    = step.text;
  document.getElementById('tutProg').textContent  = `${_tutIdx + 1} / ${_tutSteps.length}`;
  document.getElementById('tutNext').textContent  = _tutIdx === _tutSteps.length - 1 ? 'Done ✓' : 'Next →';
  document.getElementById('tutNext').disabled     = !!(step.requiresRun || step.requiresCompare);
  document.getElementById('tutPrev').disabled     = _tutIdx === 0;

  // Highlight target
  if (step.sel) {
    const el = document.querySelector(step.sel);
    if (el) {
      // Scroll instantly so the element's bounding rect is stable before measuring
      el.scrollIntoView({ block: 'nearest', behavior: 'instant' });
      const r = el.getBoundingClientRect();
      const pad = 5;
      hl.style.left    = (r.left   - pad) + 'px';
      hl.style.top     = (r.top    - pad) + 'px';
      hl.style.width   = (r.width  + pad * 2) + 'px';
      hl.style.height  = (r.height + pad * 2) + 'px';
      hl.style.display = 'block';

      // Position tip to the right of the highlighted element, flipping if needed
      const tipW = 320, tipH = 220, margin = 14;
      let tx = r.right + margin;
      let ty = r.top + r.height / 2 - tipH / 2;
      if (tx + tipW > window.innerWidth - 10) tx = r.left - tipW - margin;
      ty = Math.max(10, Math.min(ty, window.innerHeight - tipH - 10));
      tip.style.transform = '';
      tip.style.left = tx + 'px';
      tip.style.top  = ty + 'px';
    } else {
      hl.style.display = 'none';
      _centerTip(tip);
    }
  } else {
    hl.style.display = 'none';
    _centerTip(tip);
  }
  tip.style.display = 'block';
}

function _centerTip(tip) {
  tip.style.transform = 'translate(-50%, -50%)';
  tip.style.left = '50%';
  tip.style.top  = '50%';
}

function _condColorMapFromPlans(plans) {
  const map = {};
  let idx = 0;
  for (const plan of (plans || [])) {
    for (const trial of (plan.trials || [])) {
      for (const part of trial.split('-')) {
        if (!(part in map)) { map[part] = CB_PALETTE[idx % CB_PALETTE.length]; idx++; }
      }
    }
  }
  return map;
}

function renderPushedResults(pushed) {
  const area = document.getElementById('resultsArea');

  if (pushed.type === 'assignment') {
    const plans      = pushed.plans || [];
    const numTrials  = plans[0]?.trials.length || 0;
    const colorMap   = _condColorMapFromPlans(plans);
    const assignRows = pushed.assignment || [];

    const plansHTML = `
      <div class="plans-table-wrap">
        <table>
          <thead><tr>${Array.from({length: numTrials}, (_,i) => `<th>T${i+1}</th>`).join('')}</tr></thead>
          <tbody>${plans.map(p => `<tr>${p.trials.map(t => {
            const parts = t.split('-');
            const cell  = parts.map(part => {
              const col = colorMap[part] || {bg:'#f1f5f9', text:'#475569'};
              return `<span class="condition-cell" style="background:${col.bg};color:${col.text}">${esc(part)}</span>`;
            }).join('<span style="color:var(--text-2);font-size:9px;padding:0 1px">-</span>');
            return `<td class="cond-td">${cell}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;

    const assignHTML = assignRows.length ? `
      <div class="plans-table-wrap">
        <table>
          <thead><tr>${Object.keys(assignRows[0]).map(k => `<th>${esc(k)}</th>`).join('')}</tr></thead>
          <tbody>${assignRows.map(row => `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>` : '<div style="font-size:12px;color:var(--text-2)">No assignment data</div>';

    area.innerHTML = `
      <div class="results-card">
        <div class="results-header">
          <span class="results-title">Results</span>
          <span style="font-size:11px;color:var(--text-2)">${plans.length} plan${plans.length!==1?'s':''} · ${numTrials} trial${numTrials!==1?'s':''} each</span>
          <div class="results-sep"></div>
          <span style="font-size:10px;color:var(--accent);font-weight:500">▲ from script</span>
        </div>
        <div class="tab-bar">
          <button class="tab active" onclick="switchTab(event,'plans')">Plans</button>
        </div>
        <div class="tab-panel active" id="tab-plans">${plansHTML}</div>
        <div class="tab-panel" id="tab-assignment">${assignHTML}</div>
      </div>`;

  } else if (pushed.type === 'compare') {
    const run1ColorMap = _condColorMapFromPlans(pushed.run1?.plans);
    const run2ColorMap = _condColorMapFromPlans(pushed.run2?.plans);
    const colorMap = { ...run1ColorMap, ...run2ColorMap };

    area.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'results-card';
    area.appendChild(card);

    const compareData = {
      success: true,
      analysis_d1: pushed.analysis_d1,
      analysis_d2: pushed.analysis_d2,
    };
    renderCompareCard(
      card, compareData,
      pushed.run1, pushed.run2,
      pushed.label1, pushed.label2,
      colorMap,
    );

    // Append "from script" badge to header
    const hdr = card.querySelector('.results-header');
    if (hdr) {
      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:10px;color:var(--accent);font-weight:500';
      badge.textContent = '▲ from script';
      hdr.appendChild(badge);
    }
  }
}

<script>
(function() {
  const tip = document.getElementById('floatTip');
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    tip.textContent = el.dataset.tip;
    tip.style.display = 'block';
  });
  document.addEventListener('mouseout', e => {
    if (!e.target.closest('[data-tip]')) return;
    tip.style.display = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (tip.style.display === 'none') return;
    const pad = 10, tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + tw > window.innerWidth - pad) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - pad) y = e.clientY - th - pad;
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
  });
})();
</script>
<script>
(function() {
  const _defs = {
    'main-effects': {
      title: 'Main Effects',
      body: 'The independent influence of a single variable on the outcome, averaged across all levels of any other variables.',
      ex: 'The influence of interface on task time regardless of task type is the main effect of the interface.'
    },
    'interaction-effects': {
      title: 'Interaction Effects',
      body: 'The influence of a variable that depends on the level (i.e., condition) of another variable. When interaction effects exist, main effects alone can be misleading and should be interpretted with caution.',
      ex: 'If VR only outperforms baseline on the "run" task but not others, that is an interface × task interaction.'
    },
    'time-based': {
      title: 'Time-Based Effects',
      body: 'The influence of time or state over the course of an experiment. PLanet indicates which effects can be interpreted without bias from time-based effects.',
      ex: 'Learning effects are one example of time-based effects where participants perform better in later trials, simply because they learned more about the task over the course of the study.'
    },
    'ws-comparisons': {
      title: 'Within-Subjects Comparisons',
      body: 'Direct comparisons between conditions seen by the same participant, enabling higher statistical power by controlling individual differences.',
      ex: 'When each participant sees both VR and baseline, you compare them within the same person.'
    },
    'power-advantage': {
      title: 'Power Advantage',
      body: 'The statistical power advantage of one design over another for estimating a specific effect. More efficient designs have higher statistical power with the same number of participants. Two designs can have power advantages for some effects and not for others.',
      ex: 'The Within subjects design has a power advantage over the Between subjects design for the interface main effect.'
    }
  };

  const defTip = document.getElementById('defTip');

  document.addEventListener('mouseover', e => {
    const el = e.target;
    if (!el.dataset || !el.dataset.def) return;
    const d = _defs[el.dataset.def];
    if (!d) return;
    document.getElementById('defTitle').textContent = d.title;
    document.getElementById('defBody').textContent  = d.body;
    document.getElementById('defEx').textContent    = 'e.g. ' + d.ex;
    defTip.style.display = 'block';
    // Position below the element, flipping up if needed
    const r = el.getBoundingClientRect();
    const tw = 300, th = 150, margin = 8;
    let x = r.left;
    let y = r.bottom + margin;
    if (x + tw > window.innerWidth - 10) x = window.innerWidth - tw - 10;
    if (y + th > window.innerHeight - 10) y = r.top - th - margin;
    defTip.style.left = x + 'px';
    defTip.style.top  = y + 'px';
  });

  document.addEventListener('mouseout', e => {
    if (!e.target.dataset || !e.target.dataset.def) return;
    defTip.style.display = 'none';
  });
})();
</script>
